<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LNXNhat System — Matrix Router</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black:       #000000;
      --dark:        #050811;
      --panel:       #0a1128;
      --border:      #12357a;
      --blue-glow:   #00f0ff;
      --blue-accent: #0072ff;
      --white:       #eaf2ff;
      --dim:         #708cb6;
      --success:     #00ff66;
      --danger:      #ff0055;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--black); color: var(--white); font-family: 'Exo 2', sans-serif; min-height: 100vh; overflow-x: hidden; }
    
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 240, 255, 0.02) 2px, rgba(0, 240, 255, 0.02) 4px);
      pointer-events: none; z-index: 9999;
    }

    .view { display: none; padding: 30px 20px; max-width: 1200px; margin: 0 auto; animation: scanline 0.4s ease-out; }
    .view.active { display: block; }
    @keyframes scanline { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    h1 { font-family: 'Orbitron', sans-serif; color: var(--blue-glow); text-shadow: 0 0 10px rgba(0,240,255,0.4); text-align: center; margin-bottom: 10px; letter-spacing: 2px; }
    .sub-title { text-align: center; color: var(--dim); font-size: 0.9rem; margin-bottom: 30px; font-family: 'Orbitron'; }
    
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
    
    .sig-box { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; padding: 15px; position: relative; cursor: pointer; transition: all 0.2s; }
    .sig-box:hover { border-color: var(--blue-glow); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
    .sig-box .name-tag { font-weight: 600; font-size: 0.95rem; color: var(--blue-glow); margin-bottom: 10px; border-bottom: 1px dashed var(--border); padding-bottom: 5px; }
    .sig-box img { width: 100%; height: 110px; background: #000; object-fit: contain; border-radius: 4px; border: 1px solid rgba(0, 240, 255, 0.1); }
    
    .add-box { background: rgba(0, 114, 255, 0.05); border: 2px dashed var(--border); border-radius: 8px; min-height: 175px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .add-box:hover { border-color: var(--blue-glow); background: rgba(0, 240, 255, 0.05); }
    .add-box .plus-icon { font-size: 3rem; color: var(--dim); transition: 0.2s; }
    .add-box:hover .plus-icon { color: var(--blue-glow); transform: scale(1.1); }

    .debug-bar { background: #0d1117; padding: 10px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; border-bottom: 1px solid #21262d; font-size: 0.85rem; font-family: 'Orbitron'; }
    .debug-bar a { color: #fff; text-decoration: none; padding: 4px 12px; border: 1px solid var(--border); border-radius: 4px; background: rgba(0, 114, 255, 0.1); transition: 0.2s; }
    .debug-bar a:hover { border-color: var(--blue-glow); box-shadow: 0 0 10px var(--blue-glow); background: var(--panel); }
  </style>
</head>
<body>

  <div class="debug-bar">
    <span style="color:var(--success)">GUEST VIEW:</span>
    <a href="#/guest/home">/guest/home (Xem Trang Chủ Khách)</a>
    
    <span style="color:var(--danger); margin-left: 20px;">ADMIN VIEW:</span>
    <a href="#/ad/home">/ad/home (Xem Trang Chủ Admin)</a>
  </div>

  <div id="router-wrapper">
    
    <div id="view-guest-home" class="view">
      <h1>GUEST PANEL — SYSTEM SIGNATURES</h1>
      <div class="sub-title">Đường dẫn giả lập: lnxnhat.github.io/guest/home</div>
      
      <div class="card-grid" id="guest-grid-container"></div>
    </div>

    <div id="view-ad-home" class="view">
      <h1>ADMIN CONTROL PANEL</h1>
      <div class="sub-title">Đường dẫn giả lập: lnxnhat.github.io/aD/home</div>
      
      <div class="card-grid">
        <div class="add-box" onclick="alert('Tính năng chuyển đến Form tạo hồ sơ mới!')">
          <div class="plus-icon">+</div>
          <div style="font-family:'Orbitron'; font-size:0.8rem; color:var(--dim); margin-top:5px">THÊM HỒ SƠ MỚI</div>
        </div>
        <div id="ad-grid-container" style="display:contents;"></div>
      </div>
    </div>

  </div>

  <script>
    // Giả lập dữ liệu có sẵn 2 tên bất kỳ và 2 hình ảnh chữ ký ngẫu nhiên (nét vẽ mực xanh phát quang trên nền đen)
    let localDatabase = [
      { 
        id: "0001", 
        name: "Nguyễn Lâm Nhật", 
        sig: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='250' height='110' style='background:black'><path d='M 30 60 Q 70 20 110 70 T 190 40 T 220 50 M 50 80 L 200 30' stroke='%2300ff66' stroke-width='3' fill='none' stroke-linecap='round'/></svg>" 
      },
      { 
        id: "0002", 
        name: "Trần Minh Quang", 
        sig: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='250' height='110' style='background:black'><path d='M 40 40 Q 90 90 120 30 T 180 80 T 210 20 M 30 50 Q 130 10 210 80' stroke='%2300f0ff' stroke-width='3' fill='none' stroke-linecap='round'/></svg>" 
      }
    ];

    // --- BỘ ĐIỀU HƯỚNG ROUTER TỰ ĐỘNG BẮT LINK URL ---
    window.addEventListener('hashchange', routerCore);
    
    function routerCore() {
      let hash = location.hash || '#/guest/home'; // Mặc định nếu không có hash sẽ vào guest/home
      let cleanHash = hash.replace('#/', '').replace('#', '').toLowerCase();

      // Tắt toàn bộ màn hình cũ trước khi bật màn hình mới
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

      if (cleanHash === 'guest/home') {
        renderGridContainer('guest-grid-container');
        document.getElementById('view-guest-home').classList.add('active');
      }
      else if (cleanHash === 'ad/home' || cleanHash === 'ad') {
        renderGridContainer('ad-grid-container');
        document.getElementById('view-ad-home').classList.add('active');
      } else {
        // Nếu gõ các link khác, tự động trả về guest/home để test cho dễ
        location.hash = '#/guest/home';
      }
    }

    // --- HÀM VẼ CÁC Ô THÔNG TIN LÊN MÀN HÌNH ---
    function renderGridContainer(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = "";
      
      localDatabase.forEach(item => {
        const box = document.createElement('div');
        box.className = "sig-box";
        box.onclick = () => {
          alert(`Bạn vừa bấm vào hồ sơ:\n- ID: ${item.id}\n- Tên: ${item.name}`);
        };
        
        box.innerHTML = `
          <div class="name-tag">${item.name} (ID: ${item.id})</div>
          <img src="${item.sig}" alt="Signature"/>
        `;
        container.appendChild(box);
      });
    }

    // Chạy kích hoạt ngay khi trang web tải xong
    window.onload = () => {
      routerCore();
    };
  </script>
</body>
</html>
